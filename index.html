<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo da Forca</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎯 Jogo da Forca</h1>

        <p class="instrucao">
            Digite letras no teclado para jogar
        </p>

        <div id="palavra">Clique em iniciar</div>

        <div class="info">
            <p id="erros">Erros: 0</p>
            <p id="letras-erradas">Letras erradas:</p>
        </div>

        <div class="botoes">
            <button onclick="iniciar()">Iniciar</button>
            <button onclick="resetar()">Reiniciar</button>
            <button onclick="pista()">Pista</button>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>













</script>
</html>
